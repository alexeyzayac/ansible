---

- name: Установить общие пакеты для работы с KVM
  ansible.builtin.package:
    name:
      - qemu-kvm
      - libvirt-dev
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - virt-manager
      - bridge-utils
      - cpu-checker
      - pkg-config
      - ruby-dev
    state: latest

- name: Установить общие пакеты для работы с VirtualBox
  ansible.builtin.package:
    name:
      - dkms
      - build-essential
      - ca-certificates
      - wget
      - gnupg
      - lsb-release
      - "linux-headers-{{ ansible_facts.kernel }}"
    state: latest

- name: Добавить ключ VirtualBox
  ansible.builtin.shell:
    cmd: |
      wget -qO- https://www.virtualbox.org/download/oracle_vbox_2016.asc | gpg --dearmor | tee /usr/share/keyrings/oracle_vbox.gpg >/dev/null
    creates: /usr/share/keyrings/oracle_vbox.gpg

- name: Добавить репозиторий VirtualBox
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/virtualbox.list
    content: |
      deb [signed-by=/usr/share/keyrings/oracle_vbox.gpg arch=amd64] https://download.virtualbox.org/virtualbox/debian {{ ansible_facts['distribution_release'] }} contrib
    owner: root
    group: root
    mode: '0644'

- name: Обновить кэш apt
  ansible.builtin.apt:
    update_cache: yes

- name: Установить VirtualBox 7.1
  ansible.builtin.apt:
    name: virtualbox-7.1
    state: present

- name: Запустить сервис vboxdrv
  ansible.builtin.systemd:
    name: vboxdrv
    state: started
    enabled: yes

- name: Остановить сервис libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    state: stopped
    enabled: no   # отключаем автозапуск, чтобы не мешал VirtualBox
  become: true
  ignore_errors: yes   # если сервис не установлен, не прерывать

- name: Остановить сокет libvirtd.socket
  ansible.builtin.systemd:
    name: libvirtd.socket
    state: stopped
    enabled: no
  become: true
  ignore_errors: yes

- name: Выгрузить модуль kvm_intel (если загружен)
  community.general.modprobe:
    name: kvm_intel
    state: absent
  become: true
  ignore_errors: yes

- name: Выгрузить модуль kvm_amd (если загружен)
  community.general.modprobe:
    name: kvm_amd
    state: absent
  become: true
  ignore_errors: yes

- name: Выгрузить модуль kvm (если загружен)
  community.general.modprobe:
    name: kvm
    state: absent
  become: true
  ignore_errors: yes

- name: Создать группы libvirt и kvm (если их нет)
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop:
    - libvirt
    - kvm

- name: Добавить всех пользователей из /home/* в группы
  ansible.builtin.shell: 
    cmd: |
      for user in /home/*; do
        username=$(basename "$user")
        usermod -aG libvirt,kvm "$username" 2>/dev/null
      done

...
